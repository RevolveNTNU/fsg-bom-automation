name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  lint-and-check:
    name: Lint and static check
    runs-on: ubuntu-latest
    needs: secret-scan
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          python -m pip install -r requirements.txt
      - name: Run linter
        run: ruff check .
      - name: Validate Python syntax
        run: python -m py_compile bom_automation.py
      - name: Run smoke check
        run: |
          python - <<'PY'
          import importlib, sys, os

          os.environ['TEAM_ID'] = '999'
          os.environ['TEST_MODE'] = 'true'
          os.environ['DRY_RUN'] = 'true'

          if 'bom_automation' in sys.modules:
              del sys.modules['bom_automation']

          m = importlib.import_module('bom_automation')
          assert m.TEAM_ID == '999'
          assert isinstance(m.TEST_MODE, bool)
          assert isinstance(m.DRY_RUN, bool)
          assert hasattr(m, 'main')
          print('Smoke check passed')
          PY
